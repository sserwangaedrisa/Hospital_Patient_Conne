<DOCTYPE html>
    <html lang = 'en'>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
          <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
        </head>
        <body>
             <section class="mb-5 pt-5">
                <form class="row g-3 my-10" method = 'post' action = '/login' >
                    <div class = 'form sh-3'>
                        <fieldset class = 'my-3'>
                          <legend>
                            <input name = 'staff-no-login' class = 'staff/none mt-2 mb-1' type = 'checkbox' autofocus >
                            <label for = 'staff-no-login' class = 'fs-4'><em><strong >Patient?</strong></em></label>
                            <input name = 'staff-login' class = 'staff/none mt-2 mb-1 p-5' type = 'checkbox' autofocus >
                            <label for = 'staff-login' class = 'fs-4'><em><strong >CS50 staff?</strong></em></label>

                          </legend>
                        </fieldset>

                        <div class="col-md-6">
                            <label for="inputEmail4" class="form-label">Username</label>
                            <input type="text" class="form-control" name = 'username' id="inputEmail4">
                          </div>
                          <div class="col-md-6 col-12">
                            <label for="inputPassword4" class="form-label">Password</label>
                            <input type="password" class="form-control" name = 'password' id="inputPassword4">
                          </div>
                          <div class="col-12">
                            <button type="submit" class="btn btn-primary my-4 ">Login</button>
                          </div>
                        </div>
                  </form>

                  <div class= 'register-instead center'>
                    <p class = 'fs-4 '>Don't have an account?</p>
                    <form action = '/register' method = 'get'>
                      <input class = 'hidden-register' type = 'hidden' name = 'hidden-register-input'>
                      <button class = 'register-instead-button btn btn-primary fs-5'>
                       <em>Register</em>
                      </button>

                    </form>
                  </div>
              </section>


        </body>
        <link href = 'styles.js' src = 'style.js'>

    </html>

</DOCTYPE>
