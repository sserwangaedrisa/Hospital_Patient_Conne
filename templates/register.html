<DOCTYPE html>
    <html lang = 'en'>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{url_for('static', filename = 'style.css')}}">
</head>
        <body>

              <section class = 'mt-4'>
                <div class = 'center register-head'>
                  <h1 class = 'register-heading fs-3'>Register with CS50 Hospital</h1>
                </div>
                <div class = 'form'>
                  <form class="row g-3 mt-3" action = '/register' method = 'post'>
                    <div class = ''>
                      <fieldset class="mt-3">
                            <legend class="fs-4 mb-2">Select your role</legend>

                            <div class="form-check">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="role"
                                id="patient"
                                value="patient"
                                checked>
                              <label class="form-check-label fs-5" for="patient">
                                <em><strong>Patient</strong></em>
                              </label>
                            </div>

                            <div class="form-check mt-2">
                              <input
                                class="form-check-input"
                                type="radio"
                                name="role"
                                id="staff"
                                value="staff">
                              <label class="form-check-label fs-5" for="staff">
                                <em><strong>CS50 Staff</strong></em>
                              </label>
                            </div>
                          </fieldset>

                          <div class="col-md-6">
                            <label for="username" class="form-label">Username</label>
                            <input type="type" class="form-control" name = 'username' id="inputEmail4">
                          </div>

                          <div class="col-md-6">
                            <label for="inputEmail4" class="form-label">Email</label>
                            <input type="email" class="form-control" name = 'email' id="inputEmail4">
                          </div>
                          <div class="col-md-6">
                            <label for="inputPassword4" class="form-label">Password</label>
                            <input type="password" name = 'password' class="form-control" id="inputPassword4">
                          </div>
                          <div class="col-md-6 ">
                            <label for="inputPassword4" class="form-label">Confirm_Password</label>
                            <input type="password"  class="form-control" id="inputPassword4">
                          </div>
                          <div class="col-md-6 col-6">
                            <label for="inputAddress" class="form-label">Address</label>
                            <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                          </div>
                          <div class="col-md-6 col-6">
                            <label for="inputAddress2" class="form-label">Address 2</label>
                            <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
                          </div>
                          <div class="col-md-6">
                            <label for="inputCity" class="form-label">City</label>
                            <input type="text" class="form-control" id="inputCity">
                          </div>
                          <div class="col-md-4">
                            <label for="inputState" class="form-label">State</label>
                            <select id="inputState" class="form-select">
                              <option selected>Choose...</option>
                              <option>...</option>
                            </select>
                          </div>
                          <div class="col-md-2">
                            <label for="inputZip" class="form-label">Zip</label>
                            <input type="text" class="form-control" id="inputZip">
                          </div>
                          <div class="col-12">
                            <div class="form-check">
                              <input class="form-check-input" type="checkbox" id="gridCheck">
                              <label class="form-check-label" for="gridCheck">
                                Are you a resident of USA?
                              </label>
                            </div>
                          </div>

                          <div class = 'submit'>
                            <button method = 'submit' class = 'btn btn-primary my-4' >Register</button>
                          </div>
                        </div>

                  </form>
                </div>

                  <div class= 'login-instead container form'>
                    <p class = 'fs-4 '> <em>Have an account?</em></p>
                    <form action = '/login' method = 'GET'>
                      <input class = 'hidden-login' type = 'hidden' name = 'hidden-register-input'>
                      <button class = 'login-instead-button btn btn-primary fs-5 my-3'>
                        login
                      </button>

                    </form>
                  </div>


              </section>


        </body>
        <link href = 'styles.js' src = 'style.js'>

    </html>

</DOCTYPE>
