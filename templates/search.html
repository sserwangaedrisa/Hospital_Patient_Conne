    <DOCTYPE html>
    <html lang = 'en'>
        <head>
            <meta charset = 'UTF-8'>
            <meta name = 'viewport' content= 'width = device-width, initial-scale = 1'>
            <title>Chatbot</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
            <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

        </head>

        <body class="bg-light">
            <header class="mb-5">
                <nav class="navbar navbar-expand-lg navbar-light bg-body-tertiary shadow">
                    <div class="container-fluid">
                        <a class="navbar-brand fs-3 fw-bold text-primary" href="#">My Medication</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav ms-auto">
                                <li class="nav-item">
                                    <a class="nav-link active fw-semibold" aria-current="page" href="{{url_for('index')}}">Home</a>
                                </li>

                            </ul>
                            <a class="btn btn-danger ms-lg-3" href="login.html">Sign Out</a>
                        </div>
                    </div>
                </nav>
            </header>

            <section class = 'container col-8 shadow mt-10 pt-2 rounded-3'>
                <div  class = 'd-flex flex-column flex-box'>
                    <div id = 'main_div' class = 'flex-box fs-4'>
                        <div class = 'message-left fs-5' >Tell me your querry and I will be happy to help you!!!</div>

                    </div>

                    <fieldset class="col-12 d-flex justify-content-center">
                        <form action="/chatbot_api"
                            method="post"
                            id="chatbot_form"
                            class="chatbot-form d-flex align-items-center gap-3 w-75">

                            <input class="form-control "
                                autofocus
                                autocomplete="off"
                                type="text"
                                name="message"
                                id="chatbot_input"
                                placeholder="Type your health query and I help you out!" />

                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-send"></i>
                            </button>
                        </form>
                    </fieldset>

            </section>

            <script src="{{ url_for('static', filename='style.js') }}"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


        </body>

    </html>
</DOCTYPE>
