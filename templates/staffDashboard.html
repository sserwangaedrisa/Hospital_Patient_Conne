<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<header class="mb-5">
    <nav class="navbar navbar-expand-lg navbar-light bg-body-tertiary shadow">
        <div class="container-fluid">
            <a class="navbar-brand fs-3 fw-bold text-primary" href="{{ url_for('index') }}">My Medication</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto text-center">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'home' %}active text-primary{% endif %}" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'chat' %}active text-primary{% endif %}" href="{{ url_for('chatmate') }}">Dr-Chat</a>

                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'contact' %}active text-primary{% endif %}" href="{{ url_for('register') }}">New-patient</a>
                    </li>
                </ul>
                <a class="btn btn-danger ms-lg-3" href="{{ url_for('login') }}">Sign Out</a>
            </div>
        </div>
    </nav>
</header>

<main class="container">
    <section class="mb-5">
        <div class="text-center mb-4">
            <h1 class="fs-4 text-dark fw-bold">Patient's Medication</h1>

            <form action="{{ url_for('staffDashboard') }}" method="post" class="border border-2 shadow p-3 rounded">




                <fieldset class="mb-4">
                    <label class="col-12 text-success text-start mb-2">Patient name</label>
                    <input
                        list="patients_list"
                        type="text"
                        class="form-control"
                        id="patient_name"
                        name="patient_name"
                        placeholder="Type or select a patient">

                    <datalist id="patients_list">
                        {% for patient in patients %}
                            <option value="{{ patient.username }}">
                        {% endfor %}
                    </datalist>
                </fieldset>


                <fieldset class="mb-4">
                    <label class="col-12 text-success text-start mb-2">Medication Name</label>
                    <input type="text" class="form-control" id="medname" name="medname" placeholder="Medication Name">
                </fieldset>

                <fieldset class="mb-4">
                    <label class="col-12 text-success text-start mb-2">Total Dosage</label>
                    <input type="number" class="form-control" id="total_dosage" name="total_dosage" placeholder="Total Dosage">
                </fieldset>

                <fieldset class="mb-4">
                    <label class="col-12 text-success text-start mb-2">Dosage per Take</label>
                    <input type="number" class="form-control" id="dosage_per_take" name="dosage_per_take" placeholder="Dosage per Take">
                </fieldset>

                <fieldset class="mb-4">
                    <label class="col-12 text-success text-start mb-2">Dosage Interval (hours)</label>
                    <input type="number" class="form-control" id="dosage_interval" name="dosage_interval" placeholder="Dosage Interval (hours)">
                </fieldset>

                <fieldset class="mb-4">
                    <label class="col-12 text-success text-start mb-2">Start Date</label>
                    <input type="datetime-local" class="form-control" id="start_date" name="start_date">
                </fieldset>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-5">Record</button>
                </div>
            </form>
        </div>
    </section>
</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
